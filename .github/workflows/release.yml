name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: AstrophotoExplorer-Windows.zip
            archive_cmd: Compress-Archive -Path build/AstrophotoExplorer -DestinationPath build/AstrophotoExplorer-Windows.zip
          - os: ubuntu-latest
            artifact_name: AstrophotoExplorer-Linux.tar.gz
            archive_cmd: tar -czf build/AstrophotoExplorer-Linux.tar.gz -C build AstrophotoExplorer
          - os: macos-latest
            artifact_name: AstrophotoExplorer-macOS.zip
            archive_cmd: zip -r build/AstrophotoExplorer-macOS.zip build/AstrophotoExplorer

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            python3-gi \
            python3-gi-cairo \
            gobject-introspection \
            libgirepository1.0-dev

      - name: Install Node.js Dependencies & Build UI
        run: |
          npm ci
          npm run build

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install fastapi "uvicorn[standard]" websockets astropy numpy pillow scipy pyongc pywebview pyinstaller

      - name: Run Build Preparation Script
        run: python scripts/build_prep.py

      - name: Compile Standalone Application via PyInstaller
        run: |
          cd build
          pyinstaller standalone_api.spec --clean --noconfirm

      - name: Run Packaging Script
        run: python scripts/package_app.py

      - name: Compress Release Archive
        run: ${{ matrix.archive_cmd }}
        shell: pwsh

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ matrix.artifact_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
